<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ponme en el piso para calibrar el juego</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars" aria-hidden="true"></div>

  <main class="stage">
    <h1 class="title">
      <span class="wobble" style="--i:0">P</span><span class="wobble" style="--i:1">o</span><span class="wobble" style="--i:2">n</span><span class="wobble" style="--i:3">m</span><span class="wobble" style="--i:4">e</span>
      <span class="space"></span>
      <span class="wobble" style="--i:5">e</span><span class="wobble" style="--i:6">n</span>
      <span class="space"></span>
      <span class="wobble" style="--i:7">e</span><span class="wobble" style="--i:8">l</span>
      <span class="space"></span>
      <span class="wobble" style="--i:9">p</span><span class="wobble" style="--i:10">i</span><span class="wobble" style="--i:11">s</span><span class="wobble" style="--i:12">o</span>
      <span class="space"></span>
      <span class="wobble" style="--i:13">p</span><span class="wobble" style="--i:14">a</span><span class="wobble" style="--i:15">r</span><span class="wobble" style="--i:16">a</span>
      <span class="space"></span>
      <span class="wobble" style="--i:17">c</span><span class="wobble" style="--i:18">a</span><span class="wobble" style="--i:19">l</span><span class="wobble" style="--i:20">i</span><span class="wobble" style="--i:21">b</span><span class="wobble" style="--i:22">r</span><span class="wobble" style="--i:23">a</span><span class="wobble" style="--i:24">r</span>
      <span class="space"></span>
      <span class="wobble" style="--i:25">e</span><span class="wobble" style="--i:26">l</span>
      <span class="space"></span>
      <span class="wobble" style="--i:27">j</span><span class="wobble" style="--i:28">u</span><span class="wobble" style="--i:29">e</span><span class="wobble" style="--i:30">g</span><span class="wobble" style="--i:31">o</span>
      <span class="bang">🎮</span>
    </h1>

    <p class="hint">👇 haz click en el botón 👇</p>

    <button id="magicBtn" class="magic-btn" type="button">
      <span class="btn-shine" aria-hidden="true"></span>
      <span class="btn-label">CLICK AQUÍ</span>
      <span class="btn-emoji">✨</span>
    </button>

    <div id="revealCard" class="reveal-card" role="dialog" aria-hidden="true" aria-label="Sorpresa">
      <button id="closeBtn" class="close-btn" type="button" aria-label="Cerrar">✕</button>
      <div class="photo-frame">
        <img src="malcolm.png" alt="Sorpresa" class="reveal-img" />
        <div class="sparkle s1">✨</div>
        <div class="sparkle s2">⭐</div>
        <div class="sparkle s3">💫</div>
        <div class="sparkle s4">✨</div>
      </div>
      <p class="reveal-text">¡Sorpresa! 🎉</p>
      <button id="againBtn" class="again-btn" type="button">Otra vez 🔄</button>
    </div>
  </main>

  <div id="confetti" class="confetti" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
